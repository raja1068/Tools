<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="Free online tools for images and PDFs. Compress, convert, edit and optimize your files easily.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Rajarshi Roy Chaudhuri">

    <!-- Open Graph -->
    <meta property="og:title" content="ToolKit - Online Image & PDF Tools">
    <meta property="og:description" content="Free online tools for images and PDFs.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://raja1068.github.io/Tools/">

    <!-- AdSense -->
    <meta name="google-adsense-account" content="pub-9770610643444805">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=pub-9770610643444805"
        crossorigin="anonymous"></script>

    <!-- Base (IMPORTANT for GitHub Pages) -->
    <base href="/Tools/">

    <title>ToolKit - Online Image & PDF Tools</title>

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; margin:0; background:#f5f7ff; }
        .container { max-width:1200px; margin:auto; padding:20px; }

        header { background:#fff; position:sticky; top:0; z-index:100; }
        .header-container { display:flex; justify-content:space-between; align-items:center; }

        .logo { text-decoration:none; font-weight:700; font-size:22px; color:#333; }
        .logo span { color:#4361ee; }

        nav ul { display:flex; list-style:none; gap:20px; }
        nav a { text-decoration:none; color:#333; }

        .mobile-menu-btn { display:none; }

        .hero { text-align:center; padding:60px 20px; }
        .hero h1 span { color:#4361ee; }

        .search-bar input {
            padding:12px;
            width:70%;
            border-radius:20px;
            border:1px solid #ccc;
        }

        .tools-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .tool-card {
            background:#fff;
            padding:20px;
            border-radius:10px;
            text-align:center;
        }

        footer {
            background:#212529;
            color:#fff;
            text-align:center;
            padding:20px;
        }

        @media(max-width:768px){
            nav ul { display:none; flex-direction:column; }
            nav ul.show { display:flex; }
            .mobile-menu-btn { display:block; }
        }
    </style>
</head>

<body>

<header>
    <div class="container header-container">
        <a href="./index.html" class="logo">Tool<span>Kit</span></a>

        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>

        <nav>
            <ul id="navMenu">
                <li><a href="./index.html">Home</a></li>
                <li><a href="#all-tools">Tools</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="hero">
    <h1>Your Online <span>ToolKit</span></h1>
    <p>Free tools for images & PDFs. Fast, secure and easy.</p>

    <div class="search-bar">
        <input type="text" placeholder="Search tools..." aria-label="Search tools">
    </div>
</section>

<section id="all-tools" class="container">
    <h2>All Tools</h2>

    <div class="tools-grid">

        <div class="tool-card">
            <h3>Image Compressor</h3>
            <a href="./img-compressor.html">Use Tool</a>
        </div>

        <div class="tool-card">
            <h3>Image Converter</h3>
            <a href="./img-converter.html">Use Tool</a>
        </div>

        <div class="tool-card">
            <h3>PDF Compressor</h3>
            <a href="./pdf-compressor.html">Use Tool</a>
        </div>

        <div class="tool-card">
            <h3>Word to PDF</h3>
            <a href="./word-to-pdf.html">Use Tool</a>
        </div>

    </div>
</section>

<footer id="contact">
    <p>&copy; <span id="year"></span> ToolKit</p>
</footer>

<script>
    // Mobile menu
    const btn = document.getElementById('mobileMenuBtn');
    const menu = document.getElementById('navMenu');

    if (btn && menu) {
        btn.addEventListener('click', () => {
            menu.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('show');
            }
        });
    }

    // Year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Search
    const searchInput = document.querySelector('.search-bar input');
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            const term = this.value.toLowerCase();
            document.querySelectorAll('.tool-card').forEach(card => {
                card.style.display =
                    card.textContent.toLowerCase().includes(term) ? 'block' : 'none';
            });
        });
    }
</script>

</body>
</html>
